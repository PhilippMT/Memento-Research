id: memento
name: Memory
description: >
  Long-term cross-session memory. memento_store(turns) persists a finished
  session with key facts, decisions, and verbatim quotes; memento_recall(query)
  searches past sessions via vector + BM25 + causal-chain BFS and returns a
  markdown context block with relevant prior session summaries. Each employee has
  a private memory store; you cannot read or write another employee's
  memory.
added_by: CEO
type: langchain_module
sprite: desk_equipment
env_vars:
  - name: OPENROUTER_API_KEY
    label: LLM API Key
    secret: true
    placeholder: sk-or-...
  - name: OPENROUTER_BASE_URL
    label: LLM Endpoint URL
    secret: false
    placeholder: https://openrouter.ai/api/v1
  - name: MEMENTO_MODEL
    label: Finalize Model
    secret: false
    placeholder: gemini-2.5-flash
