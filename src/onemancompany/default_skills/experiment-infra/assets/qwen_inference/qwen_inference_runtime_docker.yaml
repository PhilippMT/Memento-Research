name: qwen-inference-runtime-docker

resources:
  infra: ssh/local-gpu
  cpus: 4+
  accelerators: H100:1
  image_id: docker:yangtzeailab/autoresearch-r3l:cuda12.9-py310
  use_spot: false
  autostop:
    idle_minutes: 20
    down: true

config:
  ssh:
    pod_config:
      spec:
        volumes:
          - name: data0
            hostPath:
              path: /mnt/data0
              type: Directory
        containers:
          - name: ray-node
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - name: data0
                mountPath: /mnt/data0

workdir: qwen_inference

setup: |
  source /etc/profile.d/conda-env.sh
  python -V
  python - <<'PY'
  import importlib.metadata as md
  for package in ("torch", "transformers", "accelerate"):
      try:
          print(f"{package}: {md.version(package)}")
      except md.PackageNotFoundError:
          print(f"{package}: not installed")
  PY
  python - <<'PY'
  import importlib.util
  import subprocess
  import sys

  missing = [
      package
      for package, module in (
          ("transformers>=4.40", "transformers"),
          ("accelerate", "accelerate"),
      )
      if importlib.util.find_spec(module) is None
  ]
  if missing:
      subprocess.check_call([sys.executable, "-m", "pip", "install", *missing])
  PY
  nvidia-smi
  test -d /mnt/data0/hf_models/Qwen/Qwen2.5-7B-Instruct

run: |
  source /etc/profile.d/conda-env.sh
  export CUDA_VISIBLE_DEVICES=0
  export HF_HUB_OFFLINE=1
  export TRANSFORMERS_OFFLINE=1
  python qwen_inference_test.py
