# memrl.yaml

name: mem-rl

resources:
    cpus: 4+
    accelerators: H100:1  # Or A100:8, H100:8

# Optional: upload a working directory to remote ~/sky_workdir.
# Commands in "setup" and "run" will be executed under it.
#
# workdir: /home/zsgpu/ys/autoresearch-mem

# Optional: upload local files.
# Format:
#   /remote/path: /local/path
#
# file_mounts:
#   ~/.vimrc: ~/.vimrc
#   ~/.netrc: ~/.netrc

# uv run autoresearch_memrl.py ingest
# uv run train.py

setup: |
    source /home/zsgpu/miniconda3/bin/activate
    cd memrl
    uv sync

run: |
    uv run train.py