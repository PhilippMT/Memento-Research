      <button class="chat-dialog-close" id="chatClose">✕</button>
    </div>
    <div class="chat-dialog-messages" id="chatMessages"></div>
    <div class="chat-dialog-input">
      <input type="text" id="chatInput" placeholder="Type your reply..." autocomplete="off">
      <button class="chat-dialog-send" id="chatSend">Send</button>
    </div>`;

  document.body.appendChild(_chatDialog);
  _renderChatMessages();

  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');

  input.focus();

  const doSend = async () => {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending...';

    _chatMessages.push({ from: 'user', sender: 'You', text });
    _renderChatMessages();

    // Send to backend
    const sessionId = window._currentSessionId || window._currentProjectId;
    if (!sessionId || !window._omcClient) {
      _chatMessages.push({ from: 'agent', sender: 'System', text: 'Not connected to backend or no active project.' });
      _renderChatMessages();
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
      return;
    }

    try {
      const res = await window._omcClient.sendSessionMessage(sessionId, text);
      sendBtn.textContent = 'Sent ✓';
      sendBtn.disabled = false;
      setTimeout(() => { sendBtn.textContent = 'Send'; }, 2000);
      // Also post to active stage card so user sees it in pipeline
      postNotice(`You replied: "${text}"`, 'ok');
    } catch (e) {
      _chatMessages.push({ from: 'agent', sender: 'System', text: 'Failed to send: ' + (e.message || 'unknown error') });
      _renderChatMessages();
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
    }
  };

  sendBtn.onclick = doSend;
  input.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); doSend(); } };

  document.getElementById('chatClose').onclick = closeChatDialog;
}

function closeChatDialog() {
  if (_chatDialog) {
    _chatDialog.remove();
    _chatDialog = null;
  }
}

function _renderChatMessages() {
  const container = document.getElementById('chatMessages');
  if (!container) return;
  container.innerHTML = _chatMessages.map(m => `
    <div class="chat-msg from-${m.from}">
      <div class="chat-bubble">
        <div class="chat-sender">${_escHtml(m.sender)}</div>
        ${m.from === 'agent' ? _renderMd(_clean(m.text)) : _escHtml(m.text)}
      </div>
    </div>`).join('');
  container.scrollTop = container.scrollHeight;
}

// Also post the clarification to the active stage card as a notice
window.openChatDialog = openChatDialog;
window.closeChatDialog = closeChatDialog;
window.isChatDialogOpen = () => !!_chatDialog;

// ── Breakpoint Dialog (reuses chat-dialog style) ──
let _bpDialog = null;
let _bpStageId = null;

function openBreakpointDialog(stageId, stageName) {
  closeChatDialog(); // close any existing chat
  if (_bpDialog) _bpDialog.remove();
  _bpStageId = stageId;

  _bpDialog = document.createElement('div');
  _bpDialog.className = 'chat-dialog';
  _bpDialog.id = 'bpDialog';
  _bpDialog.innerHTML = `
    <div class="chat-dialog-head">
      <div class="chat-dialog-avatar" style="background:var(--gold)">S${stageId}</div>
      <div class="chat-dialog-title">Stage ${stageId}: ${_escHtml(stageName)}<small>completed — review required</small></div>
    </div>
    <div class="chat-dialog-messages" id="bpMessages">
      <div class="chat-msg from-agent">
        <div class="chat-bubble">
          <div class="chat-sender">Pipeline</div>
          Stage ${stageId} (${_escHtml(stageName)}) has passed critic review. Approve to continue, or request revision with feedback.
        </div>
      </div>
    </div>
    <div class="chat-dialog-input" style="flex-wrap:wrap;gap:6px">
      <textarea id="bpFeedback" placeholder="Optional feedback or revision instructions..." rows="2" style="flex:1;min-width:200px;border:1.5px solid var(--border);border-radius:var(--pill);padding:8px 14px;font-family:var(--sans);font-size:.82rem;color:var(--text);background:var(--bg);outline:none;resize:vertical"></textarea>
      <button class="chat-dialog-send" id="bpReviseBtn" style="background:var(--gold)">&#8635; Revise</button>
      <button class="chat-dialog-send" id="bpApproveBtn">Approve &rarr;</button>
    </div>`;

  document.body.appendChild(_bpDialog);
  // Push meetings area up so content isn't hidden behind dialog
  const meetings = document.getElementById('meetingsArea');
  if (meetings) {
    meetings.style.paddingBottom = '320px';
    meetings.scrollTop = meetings.scrollHeight;
  }
  document.getElementById('bpFeedback').focus();

  document.getElementById('bpApproveBtn').onclick = () => {
    const fb = document.getElementById('bpFeedback').value.trim();
    if (window._controller) window._controller.resumeBreakpoint(fb, false);
  };
  document.getElementById('bpReviseBtn').onclick = () => {
    const fb = document.getElementById('bpFeedback').value.trim();
    if (!fb) { document.getElementById('bpFeedback').focus(); return; }
    if (window._controller) window._controller.resumeBreakpoint(fb, true);
  };
  // Enter = newline in textarea (default behavior, no override)
}

function addBreakpointMessage(sender, text) {
  const container = document.getElementById('bpMessages');
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'chat-msg from-agent';
  el.innerHTML = `<div class="chat-bubble"><div class="chat-sender">${_escHtml(sender)}</div>${_renderMd(_clean(text))}</div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function closeBreakpointDialog() {
  if (_bpDialog) { _bpDialog.remove(); _bpDialog = null; }
  _bpStageId = null;
  // Restore meetings area padding
  const meetings = document.getElementById('meetingsArea');
  if (meetings) meetings.style.paddingBottom = '';
}

window.openBreakpointDialog = openBreakpointDialog;
window.addBreakpointMessage = addBreakpointMessage;
window.closeBreakpointDialog = closeBreakpointDialog;

renderPipelineBar();
</script>
