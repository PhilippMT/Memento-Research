  - id: q7
    query: "What port does orders-api run on in production?"
    must_hit: [13]
    must_appear_in_context: ["8745"]
    tier: strict
  - id: q8
    query: "What is the SSH timeout in the eu-west-3 bastion?"
    must_hit: [14]
